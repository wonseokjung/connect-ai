/* ===== Agent panel — clicking any card opens this ===== */
/* YouTube has the full feature set; the other 9 show a friendly
   "개발 준비 중" placeholder so users know it's intentional, not broken. */
const AGENT_LIVE = {youtube: true};
let _agentPanelOpen = false;
let _agentPanelLoadHandler = null;
let _toolConfigLoadHandler = null;
let _currentPanelAgent = null;

function showAgentPanel(agent){
  if(_agentPanelOpen)return;
  _agentPanelOpen = true;
  _currentPanelAgent = agent;
  const bd = document.createElement('div');
  bd.className = 'ap-backdrop';
  bd.style.setProperty('--ag-color', agent.color);
  bd.style.setProperty('--ag-color-glow', agent.color + '33');
  const live = !!AGENT_LIVE[agent.id];

  /* Portrait — high-res custom image gets smooth rendering, pixel sprite
     gets crisp pixelated rendering. Locked agents are silhouetted. */
  const portraitClasses = ['ap-portrait'];
  if (agent.portraitIsCustom) portraitClasses.push('ap-portrait-custom');
  if (!live) portraitClasses.push('ap-portrait-locked');
  const portraitPos = agent.portraitIsCustom ? 'center' : 'center top';
  const portraitInner = agent.portrait
    ? '<div class="'+portraitClasses.join(' ')+'" style="background-image:url(\\''+agent.portrait+'\\');background-size:cover;background-position:'+portraitPos+'"></div>'
    : '<div class="'+portraitClasses.join(' ')+' ap-portrait-emoji">'+agent.emoji+'</div>';
  const portraitHtml = '<div class="ap-portrait-wrap">'+portraitInner+'</div>';

  const statusPill = live
    ? '<div class="ap-status-pill">ACTIVE</div>'
    : '';

  const headHtml = '<button class="ap-close" id="apClose" aria-label="닫기">×</button>'
    + '<div class="ap-head">'
    + portraitHtml
    + '<div class="ap-title">'
    +   '<div class="ap-name">'+esc(agent.name)+'</div>'
    +   '<div class="ap-role"><span class="ap-role-emoji">'+agent.emoji+'</span>'+esc(agent.role||'')+'</div>'
    +   statusPill
    + '</div>'
    + '</div>';

  let bodyHtml;
  if(live){
    bodyHtml = '<div class="ap-body">'
      /* Mission (goal) — editable per agent. Autosaves on blur. */
      + '<div class="ap-section">'
      +   '<div class="ap-section-label">Mission <span class="ap-mission-sub">— 자유롭게 수정하세요. 자동 저장돼요.</span><span class="ap-saved-pill" id="apSavedPill">저장됨</span></div>'
      +   '<textarea class="ap-goal" id="apGoal" placeholder="이 에이전트가 무엇을 향해 일하길 원하시나요? (예: 채널 구독자 1만 도달, 매주 영상 기획서 3개)"></textarea>'
      + '</div>'
      /* Skills (tools) */
      + '<div class="ap-section" id="apToolsSection" style="display:none">'
      +   '<div class="ap-section-label">Skills <span class="ap-section-count" id="apToolsCount"></span></div>'
      +   '<div class="ap-tools" id="apTools"></div>'
      + '</div>'
      /* Auto-cycle toggle */
      + '<button class="ap-toggle-row" id="apToggleRow" type="button">'
      +   '<div class="ap-toggle-text">'
      +     '<div class="ap-toggle-title">🌞 24시간 업무 (전체)</div>'
      +     '<div class="ap-toggle-sub">자리 비울 때 모든 에이전트가 자기 미션대로 한 스텝씩 일합니다</div>'
      +   '</div>'
      +   '<span class="ap-toggle" id="apAutoToggle"></span>'
      + '</button>'
      /* Toast */
      + '<div class="ap-toast" id="apToast"></div>'
      /* Primary action */
      + '<button class="ap-primary" id="apSaveRun">▶ 지금 한 스텝 실행</button>'
      /* Footer link */
      + '<div class="ap-footer"><button class="ap-footer-link" id="apOpenFolder">🗄️ 에이전트 책상 보기</button></div>'
      + '</div>';
  } else {
    /* Locked state — purely informational. No folder, no settings, no actions.
       Mirrors a "character not unlocked yet" feel from RPG character menus. */
    bodyHtml = '<div class="ap-locked-body">'
      + '<div class="ap-locked-banner"><span class="ap-locked-banner-dot"></span>Coming Soon</div>'
      + '<div class="ap-locked-msg">곧 합류합니다</div>'
      + '<div class="ap-locked-sub">'+esc(agent.name)+' 에이전트의 전용 설정과 도구는 다음 업데이트에서 풀려요.</div>'
      + '<div class="ap-locked-tip">💡 먼저 <strong>📺 유튜브 에이전트</strong>를 세팅해보세요 — 채널 그로스 도구가 준비돼있어요.</div>'
      + '</div>';
  }

  bd.innerHTML = '<div class="ap-modal">'+headHtml+bodyHtml+'</div>';
  document.body.appendChild(bd);

  function close(){
    _agentPanelOpen = false;
    _currentPanelAgent = null;
    _agentPanelLoadHandler = null;
    bd.style.transition='opacity .2s';bd.style.opacity='0';
    setTimeout(()=>bd.remove(),200);
    document.removeEventListener('keydown',escHandler);
  }
  function escHandler(e){if(e.key==='Escape' && !document.querySelector('.tc-backdrop'))close();}
  document.addEventListener('keydown',escHandler);
  bd.addEventListener('click',e=>{if(e.target===bd)close();});
  document.getElementById('apClose').addEventListener('click',close);

  const folderBtn = document.getElementById('apOpenFolder');
  if(folderBtn)folderBtn.addEventListener('click',()=>{
    vscode.postMessage({type:'openCompanyFolder',sub:'_agents/'+agent.id});
  });

  if(!live)return;

  const goalEl = document.getElementById('apGoal');
  const toastEl = document.getElementById('apToast');
  const toggleEl = document.getElementById('apAutoToggle');
  const toggleRow = document.getElementById('apToggleRow');
  const saveRunBtn = document.getElementById('apSaveRun');
  const toolsSection = document.getElementById('apToolsSection');
  const toolsList = document.getElementById('apTools');
  const toolsCount = document.getElementById('apToolsCount');

  function showToast(text){
    toastEl.textContent = text;
    toastEl.classList.add('show');
    setTimeout(()=>toastEl.classList.remove('show'),1800);
  }

  function renderTools(tools){
    if(!tools || tools.length===0){
      toolsSection.style.display='none';
      return;
    }
    toolsSection.style.display='';
    toolsCount.textContent = '('+tools.length+')';
    toolsList.innerHTML = '';
    tools.forEach(t=>{
      const row = document.createElement('div');
      row.className = 'ap-tool';
      const emoji = (t.displayName.match(/^[\\u{1F300}-\\u{1FAFF}\\u{2600}-\\u{27BF}]/u)||['🛠️'])[0];
      const cleanName = t.displayName.replace(/^[\\u{1F300}-\\u{1FAFF}\\u{2600}-\\u{27BF}]\\s*/u,'');
      row.innerHTML = '<div class="ap-tool-emoji">'+emoji+'</div>'
        + '<div class="ap-tool-meta"><div class="ap-tool-name">'+esc(cleanName)+'</div><div class="ap-tool-desc">'+esc(t.description||'')+'</div></div>'
        + '<div class="ap-tool-actions">'
        +   '<button class="ap-tool-btn" data-act="config" title="설정 (API 키 등)">⚙️</button>'
        +   '<button class="ap-tool-btn" data-act="run" title="실행">▶</button>'
        + '</div>';
      row.querySelector('[data-act="config"]').addEventListener('click',e=>{
        e.stopPropagation();
        showToolConfig(agent, t);
      });
      row.querySelector('[data-act="run"]').addEventListener('click',e=>{
        e.stopPropagation();
        vscode.postMessage({type:'runTool', agent: agent.id, tool: t.name});
        showToast('🛠️ '+cleanName+' 실행 요청을 보냈어요.');
      });
      toolsList.appendChild(row);
    });
  }

  /* Mission autosave — saves on blur and on debounced typing pause so the
     user doesn't need a save button. The pill flashes briefly to confirm. */
  const savedPill = document.getElementById('apSavedPill');
  let _lastSavedGoal = '';
  let _saveDebounce = null;
  function flashSaved(){
    if(!savedPill)return;
    savedPill.classList.add('show');
    setTimeout(()=>savedPill.classList.remove('show'), 1500);
  }
  function persistGoalIfChanged(){
    const v = goalEl.value;
    if(v === _lastSavedGoal)return;
    _lastSavedGoal = v;
    vscode.postMessage({type:'saveAgentGoal', agent: agent.id, goal: v});
    flashSaved();
  }
  goalEl.addEventListener('input', ()=>{
    if(_saveDebounce)clearTimeout(_saveDebounce);
    _saveDebounce = setTimeout(persistGoalIfChanged, 700);
  });
  goalEl.addEventListener('blur', ()=>{
    if(_saveDebounce){clearTimeout(_saveDebounce);_saveDebounce=null;}
    persistGoalIfChanged();
  });

  /* Request agent config + tools list */
  vscode.postMessage({type:'loadAgentConfig', agent: agent.id});

    if(msg.agent !== agent.id)return;
    goalEl.value = msg.goal || '';
    _lastSavedGoal = msg.goal || '';
    toggleEl.classList.toggle('on', !!msg.autoOn);
    renderTools(msg.tools || []);
  };

  toggleRow.addEventListener('click',()=>{
    const on = !toggleEl.classList.contains('on');
    toggleEl.classList.toggle('on', on);
    vscode.postMessage({type:'toggleAutoCycle', on});
    showToast(on ? '✓ 24시간 업무 ON — 모든 에이전트가 자기 미션대로 일합니다' : '⏸ 24시간 업무 OFF');
  });

  saveRunBtn.addEventListener('click',()=>{
    /* Persist any pending edit before kicking off the step. */
    persistGoalIfChanged();
    vscode.postMessage({type:'runAgentStep', agent: agent.id});
    showToast('✓ 에이전트가 작업을 시작합니다.');
    setTimeout(close, 700);
  });
}

  bd.innerHTML = '<div class="tc-modal">'
    + '<div class="tc-head">'
    +   '<div class="tc-title"><div class="tc-tool-name">'+esc(tool.displayName)+'</div><div class="tc-tool-desc">'+esc(tool.description||'')+'</div></div>'
    +   '<button class="ap-close" id="tcClose" aria-label="닫기">×</button>'
    + '</div>'
    + '<div class="tc-body" id="tcBody"></div>'
    + helpHtml
    + '<div class="tc-actions">'
    +   '<button class="tc-btn secondary" id="tcOpenFile">📝 파일로 열기</button>'
    +   '<button class="tc-btn" id="tcSave">💾 저장</button>'
    + '</div>'
    + '</div>';
  document.body.appendChild(bd);

  function close(){
    bd.style.transition='opacity .15s';bd.style.opacity='0';
    setTimeout(()=>bd.remove(),150);
    _toolConfigLoadHandler = null;
  }
  document.getElementById('tcClose').addEventListener('click',close);
  bd.addEventListener('click',e=>{if(e.target===bd)close();});

  const body = document.getElementById('tcBody');
  function renderFields(schema){
    body.innerHTML = '';
    schema.forEach(field=>{
      const wrap = document.createElement('div');
      wrap.className = 'tc-field';
      const labelHelp = field.type==='password'?'비밀로 저장됨':field.type==='list'?'한 줄에 하나씩':'';
      let inputHtml;
      if(field.type === 'list'){
        const txt = Array.isArray(field.value) ? field.value.join('\\n') : '';
        inputHtml = '<textarea class="tc-list" data-key="'+esc(field.key)+'">'+esc(txt)+'</textarea>';
      } else if(field.type === 'password'){
        inputHtml = '<input type="password" class="tc-input password" data-key="'+esc(field.key)+'" value="'+esc(String(field.value||''))+'" placeholder="여기에 입력하세요">';
      } else if(field.type === 'number'){
        inputHtml = '<input type="number" class="tc-input" data-key="'+esc(field.key)+'" value="'+esc(String(field.value||''))+'">';
      } else {
        inputHtml = '<input type="text" class="tc-input" data-key="'+esc(field.key)+'" value="'+esc(String(field.value||''))+'">';
      }
      wrap.innerHTML = '<label class="tc-label">'+esc(field.label)+(labelHelp?'<span class="tc-label-help">'+labelHelp+'</span>':'')+'</label>' + inputHtml;
      body.appendChild(wrap);
    });
  }

  /* Load fresh schema from extension (in case tool .json was edited externally) */
  vscode.postMessage({type:'loadToolConfig', agent: agent.id, tool: tool.name});
  _toolConfigLoadHandler = (msg)=>{
    if(msg.agent !== agent.id || msg.tool !== tool.name)return;
    renderFields(msg.schema || tool.configSchema || []);
  };
  /* Show what we already have, in case the load message races */
  renderFields(tool.configSchema || []);

  document.getElementById('tcOpenFile').addEventListener('click',()=>{
    vscode.postMessage({type:'openToolFile', agent: agent.id, tool: tool.name, kind:'config'});
    close();
  });
  document.getElementById('tcSave').addEventListener('click',()=>{
    const inputs = body.querySelectorAll('[data-key]');
    const values = {};
    inputs.forEach(el=>{
      const key = el.getAttribute('data-key');
      if(el.classList.contains('tc-list')){
        values[key] = el.value.split('\\n').map(s=>s.trim()).filter(Boolean);
      } else if(el.type === 'number'){
        const n = parseFloat(el.value);
        values[key] = Number.isFinite(n) ? n : 0;
      } else {
        values[key] = el.value;
      }
    });
    vscode.postMessage({type:'saveToolConfig', agent: agent.id, tool: tool.name, config: values});
    /* Reload agent config so panel shows updated tool */
    vscode.postMessage({type:'loadAgentConfig', agent: agent.id});
    close();
  });
}

/* ════════════════════════════════════════════════════════════════════════
   BOOT SEQUENCE — replaces the inline onboard/interview chat cards with a
   cinematic full-overlay flow. Three stages:
     stage 1 (folder)    → bootRenderHero
     stage 2 (interview) → bootRenderWizard (sub-steps 0..2)
     stage 3 (team)      → bootRenderTeamReveal
   Each stage replaces the .boot-stage contents with smooth transitions.
   Falls back gracefully — if the overlay errors, the original cards are
   never touched (we deleted them to keep the UI consistent). */
let _boot = null; /* { backdrop, stage, mode } */
function bootEnsure(){
  if(_boot && _boot.backdrop && document.body.contains(_boot.backdrop)) return _boot;
  const bd = document.createElement('div');
  bd.className = 'boot-backdrop';
  /* Inline styles outrank any host CSS that drops position:fixed back into
     body's flex column flow (we saw it pin to bottom-left on some hosts). */
  bd.style.cssText = 'position:fixed !important; top:0 !important; left:0 !important; right:0 !important; bottom:0 !important; width:100vw !important; height:100vh !important; z-index:99997 !important; display:flex !important; align-items:center; justify-content:center; margin:0; padding:24px; box-sizing:border-box';
  bd.innerHTML =
    '<div class="boot-stage" id="bootStage">'
    + '<span class="boot-corner tl"></span><span class="boot-corner tr"></span>'
    + '<span class="boot-corner bl"></span><span class="boot-corner br"></span>'
    + '<button class="boot-close" id="bootClose">[ESC] 닫기</button>'
    + '<div id="bootContent"></div>'
    + '</div>';
  document.body.appendChild(bd);
  _boot = { backdrop: bd, stage: bd.querySelector('#bootStage'), content: bd.querySelector('#bootContent') };
  document.getElementById('bootClose').addEventListener('click', bootClose);
  function esc(e){ if(e.key==='Escape') bootClose(); }
  bd.addEventListener('keydown', esc);
  document.addEventListener('keydown', esc);
  _boot._esc = esc;
  return _boot;
}
function bootClose(){
  if(!_boot) return;
  _boot.backdrop.classList.add('closing');
  document.removeEventListener('keydown', _boot._esc);
  setTimeout(()=>{ if(_boot){ _boot.backdrop.remove(); _boot = null; } }, 320);
}
function bootSetContent(html){
  const b = bootEnsure();
  b.content.innerHTML = html;
}
function bootBurstParticles(){
  /* Quick celebratory burst from center of stage. CSS-driven, no libs. */
  if(!_boot) return;
  const layer = document.createElement('div');
  layer.className = 'boot-particles';
  _boot.stage.appendChild(layer);
  const N = 26;
  for(let i=0;i<N;i++){
    const p = document.createElement('span');
    p.className = 'boot-particle';
    const angle = (i / N) * Math.PI * 2;
    const dist = 140 + Math.random() * 140;
    p.style.left = '50%';
    p.style.top  = '50%';
    p.style.setProperty('--dx', (Math.cos(angle) * dist).toFixed(0) + 'px');
    p.style.setProperty('--dy', (Math.sin(angle) * dist).toFixed(0) + 'px');
    p.style.background = (i % 3 === 0) ? '#FFB266' : 'var(--accent)';
    p.style.boxShadow  = '0 0 8px ' + (i % 3 === 0 ? '#FFB266' : 'var(--accent)');
    p.style.animationDelay = (Math.random() * 0.15).toFixed(2) + 's';
    layer.appendChild(p);
    requestAnimationFrame(()=>p.classList.add('go'));
  }
  setTimeout(()=>layer.remove(), 1800);
  /* Full-screen flash too */
  const flash = document.createElement('div');
  flash.className = 'boot-flash';
  document.body.appendChild(flash);
  setTimeout(()=>flash.remove(), 1100);
}

/* ── STAGE 2: wizard interview (3 steps) ──────────────────────────────── */
const _BOOT_WIZ = {
  name:'', oneLiner:'', audience:'', goalYear:'', goalMonth:'', needs:'',
};
function showInterviewCard(){
  bootEnsure();
  bootRenderWizard(0);
}
const _BOOT_STEPS = [
  { tag:'STAGE 2 / 3 · STEP 1', h1:'당신의 <span class="accent">정체성</span>을 알려주세요',
    sub:'CEO와 모든 에이전트가 이 정보를 보고 일합니다. 비워둬도 OK — 나중에 "👔 회사명" 뱃지에서 언제든 수정할 수 있어요.',
    fields:[

      { key:'oneLiner', emoji:'💬', label:'한 줄로 뭐 하시는 분이세요?', placeholder:'예: 자기계발 콘텐츠 만드는 1인 크리에이터' },
      { key:'audience', emoji:'🎯', label:'누구를 위해 만드세요?', placeholder:'예: 30대 직장인, 자격증 준비생', help:'타깃 청중' },

  { tag:'STAGE 2 / 3 · STEP 2', h1:'<span class="accent">목표</span>를 정합니다',

    fields:[
      { key:'goalYear',  emoji:'🚀', label:'올해 핵심 목표 1개', placeholder:'예: 유튜브 구독자 1만 도달' },
      { key:'goalMonth', emoji:'📅', label:'이번 달 안에 끝낼 목표 1개', placeholder:'예: 영상 4편 업로드 + 댓글 패턴 정리' },

    sub:'시간 / 돈 / 사람 / 툴 / 지식 — 무엇이든. CEO가 이 정보를 보고 어떤 에이전트에게 어떤 작업을 분배할지 우선순위를 정합니다.',

      { key:'needs', emoji:'🆘', textarea:true, label:'필요한 것을 자유롭게', placeholder:'예: 썸네일 디자인에 시간이 너무 오래 걸려서 자동화가 필요합니다. 그리고 매주 3편을 안정적으로 업로드할 콘텐츠 파이프라인이 부족해요.' },
    ]},
];
function _bootProgressHtml(active){
  let html = '<div class="boot-progress">';
  for(let i=0;i<_BOOT_STEPS.length;i++){
    const cls = i < active ? 'done' : (i === active ? 'active' : '');
    html += '<div class="boot-progress-step ' + cls + '"><span class="bp-num">' + (i+1) + '</span>'
         + '<span>' + (i===0?'정체성':(i===1?'목표':'필요')) + '</span></div>';
    if(i < _BOOT_STEPS.length - 1){
      html += '<div class="boot-progress-line ' + (i < active ? 'done' : '') + '"></div>';
    }
  }
  html += '</div>';
  return html;
}
function _bootFieldHtml(f){
  const help = f.help ? '<span class="boot-field-help">' + f.help + '</span>' : '';
  if(f.textarea){
    return '<div class="boot-field">'
         + '<div class="boot-field-label">' + f.emoji + ' ' + f.label + help + '</div>'
         + '<textarea class="boot-textarea" id="bw_' + f.key + '" placeholder="' + f.placeholder + '"></textarea>'
         + '</div>';
  }
  return '<div class="boot-field">'
       + '<div class="boot-field-label">' + f.emoji + ' ' + f.label + help + '</div>'
       + '<input class="boot-input" id="bw_' + f.key + '" placeholder="' + f.placeholder + '">'
       + '</div>';
}
function bootRenderWizard(idx){
  const step = _BOOT_STEPS[idx];
  bootEnsure();
  let body = '<div class="boot-wstep enter">';
  for(const f of step.fields) body += _bootFieldHtml(f);
  body += '</div>';
  const isLast = idx === _BOOT_STEPS.length - 1;
  const prevBtn = idx > 0
    ? '<button class="boot-btn ghost" id="bwPrev">← 이전</button>'
    : '<button class="boot-btn ghost" id="bwSkip">전체 건너뛰기</button>';
  const nextBtn = isLast
    ? '<button class="boot-btn primary" id="bwNext">✨ 회사 출범 →</button>'
    : '<button class="boot-btn primary" id="bwNext">계속 →</button>';
  bootSetContent(
    '<div class="boot-head">'
    +   '<div class="boot-tag"><span class="boot-tag-dot"></span>' + step.tag + '</div>'
    +   '<div class="boot-h1">' + step.h1 + '</div>'
    +   '<div class="boot-sub">' + step.sub + '</div>'
    + '</div>'
    + _bootProgressHtml(idx)
    + '<div class="boot-body">' + body + '</div>'
    + '<div class="boot-foot">'
    +   prevBtn
    +   '<span class="boot-spacer"></span>'
    +   '<span class="boot-foot-hint">Enter = 다음</span>'
    +   nextBtn
    + '</div>'
  );
  /* Restore previously typed values for this step */
  for(const f of step.fields){
    const el = document.getElementById('bw_' + f.key);
    if(el) el.value = _BOOT_WIZ[f.key] || '';
  }
  setTimeout(()=>{ const first = document.getElementById('bw_' + step.fields[0].key); if(first) first.focus(); }, 80);

  function captureStep(){
    for(const f of step.fields){
      const el = document.getElementById('bw_' + f.key);
      if(el) _BOOT_WIZ[f.key] = (el.value || '').trim();
    }
  }
  function goNext(){
    captureStep();
    if(isLast){
      vscode.postMessage({ type:'companyInterview', answers: Object.assign({}, _BOOT_WIZ) });
      bootRenderTeamReveal();
      return;
    }
    /* Animate exit then render next */
    const wstep = _boot.content.querySelector('.boot-wstep');
    if(wstep){
      wstep.classList.remove('enter');
      wstep.classList.add('exit');
      setTimeout(()=>bootRenderWizard(idx+1), 220);
    } else {
      bootRenderWizard(idx+1);
    }
  }
  function goPrev(){
    captureStep();
    bootRenderWizard(idx-1);
  }
  const nextEl = document.getElementById('bwNext'); if(nextEl) nextEl.addEventListener('click', goNext);
  const prevEl = document.getElementById('bwPrev'); if(prevEl) prevEl.addEventListener('click', goPrev);
  const skipEl = document.getElementById('bwSkip');
  if(skipEl) skipEl.addEventListener('click', ()=>{
    vscode.postMessage({ type:'companyInterview', answers:{} });
    bootRenderTeamReveal();
  });
  /* Enter advances. Shift+Enter newline in textareas. */
  step.fields.forEach(f=>{
    const el = document.getElementById('bw_' + f.key);
    if(!el) return;
    el.addEventListener('keydown', (e)=>{
      if(e.key === 'Enter' && !e.shiftKey && !f.textarea){ e.preventDefault(); goNext(); }
    });
  });
}

     corporateReady). If empty (early init), ask host to send them. */

    +   '<div class="boot-team-grid" id="bootTeamGrid">' + cards + '</div>'
    + '</div>'
    + '<div class="boot-foot">'
    +   '<button class="boot-btn ghost" id="bootSkipReveal">건너뛰기</button>'
    +   '<span class="boot-spacer"></span>'
    +   '<button class="boot-btn primary" id="bootEnterOffice" disabled>🏢 사무실 입장 →</button>'
    + '</div>'
  );
  const grid = document.getElementById('bootTeamGrid');
  const statusEl = document.getElementById('bootTeamStatus');
  const enterBtn = document.getElementById('bootEnterOffice');
  const cardsEls = grid ? grid.querySelectorAll('.boot-team-card') : [];
  /* Stagger reveal */
  cardsEls.forEach((c, i)=>{
    setTimeout(()=>{
      c.classList.add('in');
      if(statusEl){
        statusEl.textContent = (i + 1) + ' / ' + cardsEls.length + ' 합류 — ' + agents[i].emoji + ' ' + agents[i].name;
      }
    }, 220 + i * 140);
  });
  /* Once everyone is in, fire celebration + enable enter button */
  setTimeout(()=>{
    if(statusEl) statusEl.textContent = '✨ 팀 합류 완료';
    if(enterBtn) enterBtn.disabled = false;
    bootBurstParticles();
  }, 220 + cardsEls.length * 140 + 250);

  document.getElementById('bootSkipReveal').addEventListener('click', ()=>{
    bootClose();
    /* Open office immediately */
    vscode.postMessage({ type:'toggleOffice' });
  });
  enterBtn.addEventListener('click', ()=>{
    bootClose();
    vscode.postMessage({ type:'toggleOffice' });
  });
}

    +   '<div class="cs-section"><div class="cs-section-label">📅 이번 달 목표</div><input class="cs-input" id="csGoalMonth" placeholder="예: 영상 4편 + 댓글 패턴 정리"></div>'
    +   '<div class="cs-section"><div class="cs-section-label">🆘 지금 가장 필요한 것 <span class="cs-section-help">시간 / 돈 / 사람 / 툴 / 지식</span></div><textarea class="cs-textarea" id="csNeeds" placeholder="예: 썸네일 디자인 시간이 너무 오래 걸림 → 자동화 필요"></textarea></div>'
    +   '<div class="cs-section"><div class="cs-section-label">브랜드 톤 <span class="cs-section-help">선택 — 어떤 말투로 말할지</span></div><input class="cs-input" id="csTone" placeholder="예: 직설적, 데이터 기반, 친근함"></div>'
    +   '<div class="cs-section"><div class="cs-section-label">금기 <span class="cs-section-help">선택 — 절대 하지 말아야 할 것</span></div><input class="cs-input" id="csTaboos" placeholder="예: 클릭베이트 제목, 정치 주제"></div>'
    + '</div>'

    + '<div class="cs-actions">'
    +   '<button class="cs-btn secondary" id="csOpenFolder">🗂️ 회사 공용 드라이브</button>'
    +   '<button class="cs-btn" id="csSaveBtn">💾 저장</button>'
    + '</div>'
    + '</div>';
  document.body.appendChild(bd);

  function close(){
    _companyEditOpen = false;
    _companyEditLoadHandler = null;
    bd.style.transition = 'opacity .2s'; bd.style.opacity = '0';
    setTimeout(()=>bd.remove(), 200);
    document.removeEventListener('keydown', escHandler);
  }
  function escHandler(ev){ if(ev.key==='Escape')close(); }
  document.addEventListener('keydown', escHandler);
  bd.addEventListener('click', ev => { if(ev.target===bd)close(); });
  document.getElementById('csClose').addEventListener('click', close);
  document.getElementById('csOpenFolder').addEventListener('click', () => {
    vscode.postMessage({ type:'openCompanyFolder', sub:'_shared' });
  });

  /* Load current values from disk */
  vscode.postMessage({ type:'loadCompanyConfig' });
  _companyEditLoadHandler = (msg) => {
    const c = msg.config || {};
    const set = (id,v) => { const el = document.getElementById(id); if(el)el.value = v || ''; };
    set('csName', c.name);
    set('csOneLiner', c.oneLiner);
    set('csAudience', c.audience);
    set('csGoalYear', c.goalYear);
    set('csGoalMonth', c.goalMonth);
    set('csNeeds', c.needs);
    set('csTone', c.tone);
    set('csTaboos', c.taboos);
    setTimeout(()=>{ const f = document.getElementById('csName'); if(f)f.focus(); }, 50);
  };

  document.getElementById('csSaveBtn').addEventListener('click', () => {
    const v = id => (document.getElementById(id).value || '').trim();
    vscode.postMessage({ type:'saveCompanyConfig', config: {
      name: v('csName'),
      oneLiner: v('csOneLiner'),
      audience: v('csAudience'),
      goalYear: v('csGoalYear'),
      goalMonth: v('csGoalMonth'),
      needs: v('csNeeds'),
      tone: v('csTone'),
      taboos: v('csTaboos'),
    }});
    const saved = document.getElementById('csSaved');
    saved.classList.add('show');
    setTimeout(()=>saved.classList.remove('show'), 1400);
    setTimeout(close, 600);
  });
}

function applyCompanyState(s){
  if(!s)return;
  companyState.configured=!!s.configured;
  companyState.name=s.companyName||'';
  companyState.dir=s.companyDir||'';
  companyState.folderExists=!!s.folderExists;
  /* Company configured → onboarding is implicitly done. Auto-dismiss any
     lingering 4-step onboarding card so the welcome screen is clean. */
  if(companyState.configured && onboardingState && !onboardingState.dismissed){
    onboardingState.dismissed=true;
    const root=document.getElementById('onboardRoot');if(root)root.innerHTML='';
    try{vscode.postMessage({type:'dismissOnboarding'});}catch{}
  }
  /* 헤더 — 기업 모드일 때 회사명 OR "1인 기업" fallback 뱃지 */
  if(brandSuffix){
    if(companyState.name){
      brandSuffix.textContent='👔 '+companyState.name;
      brandSuffix.classList.add('has-name');
    } else {
      brandSuffix.textContent='👔 1인 기업';
      brandSuffix.classList.remove('has-name');
    }
  }
  /* 에이전트 보드 헤더 */
  if(abCompanyName)abCompanyName.textContent=companyState.name||'1인 기업 OS';
  if(abFolderText)abFolderText.textContent=companyState.dir||'미설정';
}

/* Agent board collapse toggle — keeps the chat clean while letting users
   peek at team status. Default: collapsed. State persists via localStorage. */
(function(){
  const board=document.getElementById('agentBoard');
  const head=document.getElementById('abHead');
  if(!board||!head)return;
  const KEY='cailab.agentBoardCollapsed';
  let collapsed;
  try{collapsed=localStorage.getItem(KEY);}catch{collapsed=null;}
  if(collapsed===null)collapsed='1';
  board.classList.toggle('collapsed', collapsed==='1');
  head.addEventListener('click',()=>{
    const nowCollapsed=!board.classList.contains('collapsed');
    board.classList.toggle('collapsed', nowCollapsed);
    try{localStorage.setItem(KEY, nowCollapsed?'1':'0');}catch{}
  });
})();

/* Mini emoji dots — visible in collapsed mode, mirror full cards' state. */
let agentMiniDotEls={};
function renderAgentBoard(agents,companyDir){
  agentMap={};agentCardEls={};agentMiniDotEls={};
  abGrid.innerHTML='';
  const miniStrip=document.getElementById('abMiniStrip');
  if(miniStrip)miniStrip.innerHTML='';
  if(companyDir){const t=document.getElementById('abFolderText');if(t)t.textContent=companyDir;}
  agents.forEach(a=>{
    agentMap[a.id]=a;
    const card=document.createElement('div');
    card.className='ab-card idle';
    card.style.setProperty('--ag-color',a.color);
    card.style.setProperty('--ag-color-glow',a.color+'33');
    card.dataset.agent=a.id;
    const statusText = AGENT_LIVE[a.id] ? 'IDLE' : '곧 합류';
    card.innerHTML='<span class="ab-led"></span><div class="ab-emoji">'+a.emoji+'</div><div class="ab-name">'+a.name+'</div><div class="ab-status">'+statusText+'</div>';
    card.addEventListener('click',()=>{
      showAgentPanel(a);
    });
    abGrid.appendChild(card);
    agentCardEls[a.id]=card;
    /* Mini dot for the collapsed strip — clickable and stops the header
       collapse from firing. */
    if(miniStrip){
      const dot=document.createElement('span');
      dot.className='ab-mini-dot idle';
      dot.style.setProperty('--ag-color',a.color);
      dot.style.setProperty('--ag-color-glow',a.color+'66');
      dot.dataset.agent=a.id;
      dot.title=a.emoji+' '+a.name;
      dot.textContent=a.emoji;
      dot.addEventListener('click',(e)=>{
        e.stopPropagation();
        showAgentPanel(a);
      });
      miniStrip.appendChild(dot);
      agentMiniDotEls[a.id]=dot;
    }
  });
}

function setCardState(agent,state,task){
  const c=agentCardEls[agent];if(!c)return;
  c.classList.remove('idle','thinking','working','done');
  c.classList.add(state);
  const s=c.querySelector('.ab-status');
  if(s){
    if(state==='idle')s.textContent=AGENT_LIVE[agent] ? 'IDLE' : '곧 합류';
    else if(state==='thinking')s.textContent='THINKING';
    else if(state==='working')s.textContent='WORKING';
    else if(state==='done')s.textContent='DONE';
  }
  const dot=agentMiniDotEls[agent];
  if(dot){
    dot.classList.remove('idle','thinking','working','done');
    dot.classList.add(state);
  }
  /* 작업 라벨 toast */
  const old=c.querySelector('.ab-task-toast');if(old)old.remove();
  if(task && (state==='working'||state==='thinking')){
    const t=document.createElement('div');t.className='ab-task-toast';t.textContent=task;
    c.appendChild(t);
    setTimeout(()=>{if(t.parentNode)t.style.opacity='0.0';setTimeout(()=>t.remove(),400);},2400);
  }
}

function resetAllAgentCards(){
  Object.keys(agentCardEls).forEach(id=>setCardState(id,'idle'));
  if(abSvg)abSvg.innerHTML='';
}

function drawDispatchBeams(taskAgentIds){
  if(!abSvg||!agentCardEls.ceo)return;
  abSvg.innerHTML='';
  const board=abGrid.getBoundingClientRect();
  const ceoR=agentCardEls.ceo.getBoundingClientRect();
  const cx=ceoR.left+ceoR.width/2-board.left;
  const cy=ceoR.top+ceoR.height/2-board.top;
  const w=abGrid.clientWidth,h=abGrid.clientHeight;
  abSvg.setAttribute('viewBox','0 0 '+w+' '+h);
  abSvg.setAttribute('width',w);abSvg.setAttribute('height',h);
  taskAgentIds.forEach((id,i)=>{
    const card=agentCardEls[id];if(!card||id==='ceo')return;
    const r=card.getBoundingClientRect();
    const tx=r.left+r.width/2-board.left;
    const ty=r.top+r.height/2-board.top;
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    /* curved beam */
    const mx=(cx+tx)/2,my=(cy+ty)/2-12;
    path.setAttribute('d','M '+cx+' '+cy+' Q '+mx+' '+my+' '+tx+' '+ty);
    path.setAttribute('class','ab-beam dispatching');
    const a=agentMap[id];if(a){path.style.stroke=a.color;path.style.filter='drop-shadow(0 0 6px '+a.color+')';}
    path.style.animationDelay=(i*0.08)+'s';
    abSvg.appendChild(path);
  });
}

function startAgentMsg(agent,task){
  const a=agentMap[agent];if(!a)return;
  leaveInitState();
  if(agentStreamEls[agent]){endAgentMsg(agent);}
  const el=document.createElement('div');el.className='msg msg-agent streaming';
  el.style.setProperty('--ag-color',a.color);
  el.style.setProperty('--ag-color-glow',a.color+'40');
  const head=document.createElement('div');head.className='msg-head';
  const safeTask=esc(task||'').slice(0,80);
  head.innerHTML='<div class="av">'+a.emoji+'</div><span class="ag-tag">'+a.name+'</span><span class="ag-task">'+safeTask+'</span><span class="ag-elapsed" id="ge-'+agent+'-'+Date.now()+'">0:00</span>';
  const elapsedEl=head.querySelector('.ag-elapsed');
  const body=document.createElement('div');body.className='msg-body';
  el.appendChild(head);el.appendChild(body);chat.appendChild(el);scrollChatToBottomIfNear();
  const startedAt=Date.now();
  const tick=setInterval(()=>{
    if(!el.parentNode){clearInterval(tick);return;}
    const s=Math.floor((Date.now()-startedAt)/1000);
    if(elapsedEl)elapsedEl.textContent=Math.floor(s/60)+':'+String(s%60).padStart(2,'0');
  },1000);
  agentStreamEls[agent]={el:el,body:body,raw:'',tick:tick};
}

function appendAgentChunk(agent,value){
  let s=agentStreamEls[agent];
  if(!s){startAgentMsg(agent,'');s=agentStreamEls[agent];}
  if(!s)return;
  s.raw=(s.raw||'')+value;
  s.body.innerHTML=fmt(s.raw);
  scrollChatToBottomIfNear();
}

function endAgentMsg(agent){
  const s=agentStreamEls[agent];if(!s)return;
  s.el.classList.remove('streaming');
  if(s.tick)clearInterval(s.tick);
  delete agentStreamEls[agent];
}

function showBriefCard(brief,tasks){

let streamEl=null,streamBody=null;
window.addEventListener('message',e=>{const msg=e.data;switch(msg.type){
  case 'response':hideLoader();setSending(false);addMsg(msg.value,'ai');break;
  case 'companyMetrics': {
    const elK = document.getElementById('dashKnowledge');
    const elT = document.getElementById('dashTasks');
    if (elK) elK.textContent = msg.metrics.knowledgeInjected || 0;
    if (elT) elT.textContent = msg.metrics.tasksCompleted || 0;
    break;
  }
  case 'brainInject':showInjectCard(msg.title,msg.relPath);break;
  case 'onboardingState':{
    onboardingState = msg;
    if (!msg.dismissed) renderOnboarding();
    break;
  }
  case 'ideModelsProbed':{
    /* Diagnostic: tell user what host-IDE models are reachable via vscode.lm.
       Logged to console + a one-time inline notice if any external model exists. */
    try {
      console.log('[Connect AI] vscode.lm probe — models:', msg.models, 'error:', msg.error);
      if (msg.error) {
        console.log('[Connect AI] IDE 모델 probe 실패:', msg.error);
      } else if (Array.isArray(msg.models) && msg.models.length > 0) {
        const summary = msg.models.map(m => '• ' + (m.vendor||'?') + ' / ' + (m.family||'?') + ' (' + m.id + ')').join('\\n');
        const el = document.createElement('div'); el.className='msg';
        el.innerHTML = '<div class="msg-body" style="color:#22D3EE;font-size:12px;line-height:1.6;background:rgba(34,211,238,.05);border:1px solid rgba(34,211,238,.3);padding:10px 12px;border-radius:8px"><strong>🌐 IDE가 익스텐션에 노출하는 모델 ' + msg.models.length + '개:</strong><br>' + summary.replace(/\\n/g, '<br>') + '<br><br><span style="color:var(--text-dim);font-size:11px">→ 통합하면 Gemini/Claude 등 호스트 모델을 모델 드롭다운에 추가할 수 있습니다 (개발자에게 요청 필요)</span></div>';
        chat.appendChild(el); scrollChatToBottomIfNear();
      } else {
        console.log('[Connect AI] IDE 모델 probe — 노출되는 모델 없음. Antigravity가 vscode.lm으로 모델을 안 열어주는 것으로 추정.');
      }
    } catch {}
    break;
  }
  case 'engineDetected':{
    if (onboardingState) {
      onboardingState.steps.engine.done = !!msg.engine && !!msg.model;
      onboardingState.steps.engine.detected = msg.engine || '';
      onboardingState.steps.engine.model = msg.model || '';
      if (onboardingState.steps.engine.done) onboardingStep = 2;
      renderOnboarding();
    }
    break;
  }
  case 'brainFolderPicked':{
    if (onboardingState) {
      onboardingState.steps.brain.done = !!msg.path;
      onboardingState.steps.brain.path = msg.path || '';
      if (onboardingState.steps.brain.done) onboardingStep = 3;
      renderOnboarding();
    }
    break;
  }
  case 'githubRepoResult':{
    const r = document.getElementById('ob-repo-result');
    if (r) {
      if (msg.ok) {
        r.innerHTML = '<div class="onboard-result">✅ 저장됨'+(msg.url?': <code>'+msg.url+'</code>':' (빈 값으로 클리어)')+'</div>';
        if (onboardingState) {
          onboardingState.steps.github.done = !!msg.url;
          onboardingState.steps.github.url = msg.url || '';
          setTimeout(() => { onboardingStep = 4; renderOnboarding(); }, 700);
        }
      } else {
        r.innerHTML = '<div class="onboard-result error">⚠️ '+msg.error+'</div>';
      }
    }
    break;
  }
  case 'officeStateChanged':{
    officeOpen=!!msg.open;
    /* Tie corp mode visual to office state — closing the office turns the button OFF visually too */
    corporateMode=officeOpen;
    /* Keep extension's sidebar-broadcast gate in sync with the office toggle.
       Otherwise opening/closing the office leaves _sidebarCorpModeOn stale. */
    try{vscode.postMessage({type:'corpModeToggle',on:officeOpen});}catch{}
    document.body.classList.toggle('office-open',officeOpen);
    document.body.classList.toggle('corp-on',officeOpen);
    if(corporateBtn){
      corporateBtn.style.opacity=officeOpen?'1':'0.5';
      corporateBtn.style.background=officeOpen?'linear-gradient(135deg,var(--accent),var(--accent2))':'';
      corporateBtn.title=officeOpen?'1인 기업 모드 — 사무실 열림 (클릭해서 닫기)':'1인 기업 모드 — OFF (클릭해서 사무실 열기)';
    }
    if(input)input.placeholder=officeOpen?'한 줄 명령을 내리세요. 팀이 알아서 일합니다.':'무엇을 만들어 드릴까요?';
    break;
  }
  case 'error':hideLoader();setSending(false);addMsg(msg.value,'error');break;
  case 'streamStart':{
    hideLoader();
    streamEl=document.createElement('div');streamEl.className='msg';
    const h=document.createElement('div');h.className='msg-head';
    h.innerHTML='<div class="av av-ai">✦</div><span>Connect AI</span><span class="msg-time">'+getTime()+'</span>';
    streamBody=document.createElement('div');streamBody.className='msg-body stream-active';
    streamEl.appendChild(h);streamEl.appendChild(streamBody);chat.appendChild(streamEl);scrollChatToBottomIfNear();
    break;}
  case 'streamChunk':{
    if(streamBody){streamBody.innerHTML=fmt(streamBody._raw=(streamBody._raw||'')+msg.value);scrollChatToBottomIfNear();}
    break;}
  case 'streamEnd':{
    if(streamBody)streamBody.classList.remove('stream-active');
    /* Add regenerate button */
    if(streamEl){
      const rb=document.createElement('button');rb.className='regen-btn';rb.innerHTML='<span style="font-size:13px;line-height:1">↻</span> 재생성';
      rb.addEventListener('click',()=>{rb.remove();vscode.postMessage({type:'regenerate'});showLoader();setSending(true);});
      streamEl.appendChild(rb);
    }
    setSending(false);streamEl=null;streamBody=null;
    break;}
  case 'modelsList':modelSel.innerHTML='';msg.value.forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m;modelSel.appendChild(o)});break;
  case 'thinkingModeState':
    thinkingModeOn = !!msg.value;
    thinkingBtn.style.opacity = thinkingModeOn ? '1' : '0.5';
    thinkingBtn.style.background = thinkingModeOn ? 'linear-gradient(135deg,var(--accent),var(--accent2))' : '';
    thinkingBtn.title = thinkingModeOn ? 'Thinking Mode: ON (클릭으로 끄기)' : 'Thinking Mode — AI가 어떻게 생각하는지 시각화';
    break;
  case 'statusUpdate':
    updateStatus(msg.value);
    break;
  case 'attachCitations': {
    // Find the most recent AI message and append citation chips
    const msgs = chat.querySelectorAll('.msg');
    const last = msgs[msgs.length-1];
    if (last && msg.sources && msg.sources.length > 0) {
      const wrap = document.createElement('div');
      wrap.className = 'citations';
      wrap.style.cssText = 'display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;margin-left:29px;font-size:11px;color:var(--text-dim);align-items:center';
      const label = document.createElement('span');
      label.textContent = '📚 출처:';
      label.style.cssText = 'opacity:0.7';
      wrap.appendChild(label);
      msg.sources.forEach(src => {
        const chip = document.createElement('button');
        chip.textContent = src.length > 28 ? src.slice(0, 26) + '…' : src;
        chip.title = src;
        chip.style.cssText = 'background:rgba(0,255,102,0.08);border:1px solid rgba(0,255,102,0.25);color:var(--accent);padding:3px 10px;border-radius:12px;font-size:10px;cursor:pointer;font-family:inherit;transition:all 0.2s';
        chip.onmouseover = () => { chip.style.background='rgba(0,255,102,0.18)'; chip.style.transform='translateY(-1px)'; };
        chip.onmouseout = () => { chip.style.background='rgba(0,255,102,0.08)'; chip.style.transform='translateY(0)'; };
        chip.onclick = () => vscode.postMessage({ type: 'highlightBrainNote', note: src });
        wrap.appendChild(chip);
      });
      last.appendChild(wrap);
      scrollChatToBottomIfNear();
    }
    break;
  }
  case 'clearChat':
    document.body.classList.add('init');
    chat.innerHTML=welcomeHtml();
    break;
  case 'restoreMessages':
    chat.innerHTML='';
    if(msg.value&&msg.value.length>0){
      document.body.classList.remove('init');
      msg.value.forEach(m=>addMsg(m.text,m.role));
    } else {
      document.body.classList.add('init');
      chat.innerHTML=welcomeHtml();
    }
    break;
  case 'focusInput':input.focus();break;
  case 'injectPrompt':input.value=msg.value;input.style.height='auto';input.style.height=Math.min(input.scrollHeight,150)+'px';send({bypassCorporate:true});break;
  case 'corporateReady':
    renderAgentBoard(msg.agents||[],msg.companyDir||'');
    applyCompanyState(msg);
    break;
  case 'corporateState':
    applyCompanyState(msg);
    if(msg.note){addCorpBanner(msg.note);}
    /* 폴더는 막 만들어졌고 정체성이 비어있으면 바로 인터뷰 */
    if(corporateMode && companyState.folderExists && !companyState.configured){
      setTimeout(showInterviewCard,200);
    }
    /* Setup-complete banner — fire once per session, not on every state echo */
    if(corporateMode && companyState.configured && !_setupCompletionAnnounced){
      _setupCompletionAnnounced=true;
      addCorpBanner('✅ '+(companyState.name||'회사')+' 설정 완료. 명령을 내려보세요.');
    }
    break;
  case 'agentConfigLoaded':
    if(_agentPanelLoadHandler)_agentPanelLoadHandler(msg);
    break;
  case 'toolConfigLoaded':
    if(_toolConfigLoadHandler)_toolConfigLoadHandler(msg);
    break;
  case 'companyConfigLoaded':
    if(_companyEditLoadHandler)_companyEditLoadHandler(msg);
    break;
  case 'companyConfigSaved':
    /* Save toast already shown locally; refresh badges via the
       upcoming corporateState echo. */
    break;
  case 'agentDispatch':{
    hideLoader();
    document.body.classList.add('corp-dispatching');
    const taskIds=(msg.tasks||[]).map(t=>t.agent);
    showBriefCard(msg.brief||'',msg.tasks||[]);
    /* 모든 selected agent를 thinking 상태로 점등 */
    taskIds.forEach(id=>setCardState(id,'thinking'));
    /* SVG 빛줄기 */
    setTimeout(()=>drawDispatchBeams(['ceo'].concat(taskIds)),60);
    setTimeout(()=>{document.body.classList.remove('corp-dispatching');if(abSvg)abSvg.innerHTML='';},1700);
    break;
  }
  case 'agentStart':{
    hideLoader();
    setCardState(msg.agent,'working',msg.task);
    /* CEO는 카드 펄스만, specialist는 채팅 메시지도 시작 */
    if(msg.agent!=='ceo'){startAgentMsg(msg.agent,msg.task||'');}
    break;
  }
  case 'agentChunk':{
    appendAgentChunk(msg.agent,msg.value||'');
    break;
  }
  case 'agentEnd':{
    setCardState(msg.agent,'done');
    endAgentMsg(msg.agent);
    break;
  }
  case 'corporateReport':{
    showReportCard(msg.brief||'',msg.report||'',msg.sessionPath||'',msg.sessionRel||'');
    setSending(false);
    /* 잠시 후 모든 카드 idle로 복귀 */
    setTimeout(()=>{Object.keys(agentCardEls).forEach(id=>setCardState(id,'idle'));},2200);
    break;
  }
  case 'agentConfer':{
    /* Confer turns belong to the office panel + conversation log only.
       Pile of these in the sidebar chat is noise — break here. */
    break;
  }
  case 'decisionsLearned':{
    const decs=msg.decisions||[];
    if(decs.length===0)break;
    leaveInitState();
    const el=document.createElement('div');el.className='msg';
    el.innerHTML='<div class="brief-card" style="--ag-color:#A78BFA;border-color:rgba(167,139,250,.4);background:linear-gradient(135deg,rgba(167,139,250,.06),rgba(167,139,250,.02));box-shadow:0 0 14px rgba(167,139,250,.15)">'
      +'<div class="brief-head" style="color:#A78BFA">🧠 자가학습 — decisions.md에 누적됨</div>'
      +'<div style="font-size:12px;color:var(--text-bright);line-height:1.7">'+decs.map(d=>'• '+esc(d)).join('<br>')+'</div>'
      +'</div>';
    chat.appendChild(el);scrollChatToBottomIfNear();
    break;
  }
  case 'telegramSent':{
    /* 사이드바에서는 작은 banner */
    addCorpBanner && addCorpBanner('📱 Secretary가 텔레그램으로 보고를 보냈어요.');
    break;
  }
} });
} catch(err) {
  document.body.innerHTML = '<div style="color:#ff4444;padding:20px;background:#111;height:100%;font-size:14px;overflow:auto;"><h2>⚠️ WEBVIEW JS CRASH</h2><pre>' + err.name + ': ' + err.message + '\\n' + err.stack + '</pre></div>';
}
</script></body></html>
